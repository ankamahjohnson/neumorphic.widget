<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphic Widget</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="widget" id="widget">

    <!-- ── HEADER CARD ── -->
    <div class="card header-card">
      <div class="date-time">
        <div class="date" id="date">9/08</div>
        <div class="time" id="time">6 PM</div>
      </div>
      <div class="header-badges">
        <div class="badge">R</div>
        <div class="badge">24</div>
      </div>
    </div>

    <!-- ── PROJECT BAR ── -->
    <div class="card project-bar">
      <div class="project-info">
        <span class="project-label">Your last project</span>
        <div class="project-name">
          T.029
          <span class="fav-tag">FAV</span>
        </div>
      </div>
      <div class="project-actions">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
          </svg>
        </button>
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── MAIN PANEL ── -->
    <div class="card main-panel">

      <!-- Clock -->
      <div class="clock-wrap">
        <div class="clock" id="clock">
          <div class="clock-label top">12</div>
          <div class="clock-label right">3</div>
          <div class="clock-label bottom-num">6</div>
          <div class="clock-label left">9</div>
          <div class="hand hour-hand"   id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="hand second-hand" id="secondHand"></div>
          <div class="center-dot" id="centerDot"></div>
        </div>
      </div>

      <!-- Track panel -->
      <div class="track-panel">

        <div class="track-art" id="trackArt">
          <div class="art-placeholder" id="artPlaceholder">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Tap to upload</span>
          </div>
          <img id="albumArt" src="" alt="Album Art" />

          <!-- Waveform bars -->
          <div class="waveform" id="waveform">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span>
          </div>

          <button class="like-btn" id="likeBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" multiple />
        </div>

        <!-- Track name marquee -->
        <div class="track-info-wrap">
          <div class="track-info" id="trackInfo">
            <span id="trackInfoText">Track 099 / New...</span>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-wrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-times">
            <span id="currentTime">0:00</span>
            <span id="totalTime">3:30</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="track-controls">
          <button class="ctrl-btn" id="prevBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="19 20 9 12 19 4 19 20"/>
              <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="ctrl-btn play-btn" id="playBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="nextBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 4 15 12 5 20 5 4"/>
              <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Volume slider -->
        <div class="volume-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          </svg>
          <div class="volume-track" id="volumeTrack">
            <div class="volume-fill" id="volumeFill"></div>
            <div class="volume-thumb" id="volumeThumb"></div>
          </div>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </div>

      </div>
    </div>

    <!-- ── BOTTOM BAR ── -->
    <div class="bottom-bar">
      <button class="upload-btn" id="uploadTrigger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        upload cover
      </button>
      <button class="icon-btn round-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
